site_name: MaestroTerminal
site_url: https://rmkohlman.github.io/MaestroTerminal/
site_description: Terminal configuration management via the dvt CLI, part of the DevOpsMaestro toolkit
site_author: Robert Kohlman
repo_name: rmkohlman/MaestroTerminal
repo_url: https://github.com/rmkohlman/MaestroTerminal

theme:
  name: material
  palette:
    # Light mode
    - media: "(prefers-color-scheme: light)"
      scheme: default
      primary: indigo
      accent: indigo
      toggle:
        icon: material/brightness-7
        name: Switch to dark mode
    # Dark mode
    - media: "(prefers-color-scheme: dark)"
      scheme: slate
      primary: indigo
      accent: indigo
      toggle:
        icon: material/brightness-4
        name: Switch to light mode
  features:
    - navigation.instant
    - navigation.tracking
    - navigation.sections
    - navigation.expand
    - navigation.top
    - search.suggest
    - search.highlight
    - content.code.copy
    - content.tabs.link
  icon:
    repo: fontawesome/brands/github

plugins:
  - search
  - tags

markdown_extensions:
  - pymdownx.highlight:
      anchor_linenums: true
      line_spans: __span
      pygments_lang_class: true
  - pymdownx.inlinehilite
  - pymdownx.snippets
  - pymdownx.superfences
  - pymdownx.tabbed:
      alternate_style: true
  - admonition
  - pymdownx.details
  - tables
  - toc:
      permalink: true

extra:
  social:
    - icon: fontawesome/brands/github
      link: https://github.com/rmkohlman/MaestroTerminal
  version:
    provider: mike

nav:
  - Home: index.md
  - Getting Started:
    - Installation: getting-started/installation.md
    - Quick Start: getting-started/quickstart.md
  - Prompts:
    - Overview: prompts/overview.md
    - Prompt Library: prompts/library.md
    - Theme Integration: prompts/theme-integration.md
  - Shell:
    - Shell Plugins: shell/plugins.md
    - Shell Configuration: shell/configuration.md
  - Terminal:
    - Profiles: terminal/profiles.md
    - Emulators: terminal/emulators.md
    - WezTerm: terminal/wezterm.md
    - Packages: terminal/packages.md
  - Commands Reference: commands.md
  - YAML Reference:
    - TerminalPrompt: reference/terminal-prompt.md
    - TerminalPackage: reference/terminal-package.md
