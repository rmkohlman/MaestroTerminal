site_name: MaestroTerminal
site_url: https://rmkohlman.github.io/MaestroTerminal/
site_description: Terminal configuration management library for the DevOpsMaestro ecosystem
site_author: Robert Kohlman
repo_name: rmkohlman/MaestroTerminal
repo_url: https://github.com/rmkohlman/MaestroTerminal

theme:
  name: material
  palette:
    # Light mode
    - media: "(prefers-color-scheme: light)"
      scheme: default
      primary: indigo
      accent: indigo
      toggle:
        icon: material/brightness-7
        name: Switch to dark mode
    # Dark mode
    - media: "(prefers-color-scheme: dark)"
      scheme: slate
      primary: indigo
      accent: indigo
      toggle:
        icon: material/brightness-4
        name: Switch to light mode
  features:
    - navigation.instant
    - navigation.tracking
    - navigation.sections
    - navigation.expand
    - navigation.top
    - search.suggest
    - search.highlight
    - content.code.copy
    - content.tabs.link
  icon:
    repo: fontawesome/brands/github

plugins:
  - search
  - tags

markdown_extensions:
  - pymdownx.highlight:
      anchor_linenums: true
      line_spans: __span
      pygments_lang_class: true
  - pymdownx.inlinehilite
  - pymdownx.snippets
  - pymdownx.superfences
  - pymdownx.tabbed:
      alternate_style: true
  - admonition
  - pymdownx.details
  - tables
  - toc:
      permalink: true

extra:
  social:
    - icon: fontawesome/brands/github
      link: https://github.com/rmkohlman/MaestroTerminal
  version:
    provider: mike

nav:
  - Home: index.md
  - Manager: manager.md
  - Emulators: emulators.md
  - Packages: packages.md
  - Plugins: plugins.md
  - Prompts: prompts.md
  - Prompt Styles: prompt-styles.md
  - Prompt Extensions: prompt-extensions.md
  - Prompt Composer: prompt-composer.md
  - Profiles: profiles.md
  - Shell: shell.md
  - WezTerm: wezterm.md
  - API Reference: api-reference.md
